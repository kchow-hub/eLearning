<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇家字形結構大挑戰</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 基礎設定與公主風核心變數 */
        :root {
            --primary: #ff85a2;
            --secondary: #fce4ec;
            --accent: #d81b60;
            --bg-gradient: linear-gradient(135deg, #fff1f3 0%, #fce4ec 100%);
            --text: #4a1525;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 20px 40px rgba(255, 133, 162, 0.25);
            --border-color: #ffb7c5;
        }

        /* 王子風核心變數 */
        body.prince-theme {
            --primary: #2196f3;
            --secondary: #e3f2fd;
            --accent: #0d47a1;
            --bg-gradient: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 100%);
            --text: #0a1931;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 20px 40px rgba(33, 150, 243, 0.25);
            --border-color: #90caf9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* 遊戲視窗架構 */
        #game-window {
            width: 1100px;
            height: 780px;
            background: var(--card-bg);
            border-radius: 40px;
            box-shadow: var(--shadow);
            border: 12px solid white;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 畫面顯示/隱藏核心邏輯 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 40px;
            z-index: 10;
        }

        .screen.active {
            display: flex; 
            animation: screenFadeIn 0.5s ease forwards;
        }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 背景流線裝飾 */
        .circle-deco {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.12;
            filter: blur(40px);
            z-index: 1;
        }

        /* 首頁美化 */
        .title-container {
            text-align: center;
            margin-bottom: 25px;
            z-index: 5;
        }

        h1.main-title {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px white, 5px 5px 0px var(--secondary);
        }

        .subtitle {
            font-size: 20px;
            color: var(--text);
            font-weight: bold;
            opacity: 0.8;
        }

        .mode-selection {
            display: flex;
            gap: 40px;
            z-index: 5;
            margin-bottom: 30px;
        }

        .mode-btn {
            width: 240px;
            height: 150px;
            border-radius: 28px;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        .mode-btn i { font-size: 44px; }
        .btn-pink { background: linear-gradient(135deg, #ff6584, #ff85a2); border: 4px solid #fff; }
        .btn-blue { background: linear-gradient(135deg, #1e88e5, #42a5f5); border: 4px solid #fff; }
        
        .mode-btn:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
        }

        /* 遊戲進行畫面 HUD */
        .top-hud {
            position: absolute;
            top: 25px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-card {
            background: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hud-btn-home {
            background: #fff;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }
        .hud-btn-home:hover {
            border-color: #ff5252;
            color: #ff5252;
            transform: scale(1.05);
        }

        /* 田字格漢字顯示區 */
        .game-main-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        .word-instruction {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .tianzige-box {
            width: 200px;
            height: 200px;
            background: #fff;
            border: 6px solid var(--primary);
            border-radius: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 120px;
            font-weight: 900;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .tianzige-box::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            border-radius: 22px;
            background-image: 
                linear-gradient(to right, transparent 49%, #ccc 49%, #ccc 51%, transparent 51%),
                linear-gradient(to bottom, transparent 49%, #ccc 49%, #ccc 51%, transparent 51%);
            background-size: 100% 100%;
            pointer-events: none;
        }

        .tianzige-box span { z-index: 2; position: relative; }

        /* 選項按鈕排版 */
        .quiz-options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            width: 100%;
            max-width: 750px;
            margin-top: 30px;
        }

        .quiz-opt-btn {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 22px;
            padding: 18px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.03);
            color: var(--text);
        }

        .quiz-opt-btn:hover {
            border-color: var(--primary);
            background: var(--secondary);
            transform: translateY(-3px);
        }

        /* 答對/答錯反饋大勾勾與叉叉 */
        .stamp-feedback {
            position: absolute;
            font-size: 160px;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stamp-feedback.pop {
            opacity: 0.9;
            transform: scale(1.2) rotate(-15deg);
        }
        #right-stamp { color: #4caf50; }
        #wrong-stamp { color: #f44336; }

        /* 答錯晃動特效 */
        .shake-effect { animation: shakeAnimate 0.4s ease; }
        @keyframes shakeAnimate {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }

        /* 數據欄位排版 */
        .data-panels-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 950px;
            height: 280px;
            z-index: 5;
        }

        .panel-box {
            flex: 1;
            background: white;
            border: 3px solid var(--border-color);
            border-radius: 24px;
            padding: 15px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 12px;
            color: var(--accent); display: flex; justify-content: center; align-items: center; gap: 8px;
            border-bottom: 2px dashed var(--border-color); padding-bottom: 8px;
        }

        .panel-scroll-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .panel-scroll-list::-webkit-scrollbar { width: 6px; }
        .panel-scroll-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5px; border-bottom: 1px solid #f2f2f2; font-size: 17px; font-weight: bold;
        }
        .data-row:last-child { border-bottom: none; }
        .time-stamp-text { font-size: 13px; color: #888; font-weight: normal; }

        /* 結算頁面特有樣式 */
        .end-title { font-size: 44px; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .score-board { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .score-board span { color: var(--accent); font-size: 36px; }
        
        .btn-action-group { display: flex; gap: 20px; margin-top: 15px; }
        .btn-restart {
            padding: 12px 40px; font-size: 22px; font-weight: bold; color: white;
            background: var(--accent); border: none; border-radius: 20px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: transform 0.2s;
        }
        .btn-restart:hover { transform: scale(1.05); }

        .name-input-area { display: flex; gap: 15px; margin-bottom: 15px; z-index: 5; }
        .name-input-area input { padding: 10px 20px; font-size: 18px; border-radius: 15px; border: 2px solid #ccc; font-weight: bold; text-align: center; outline: none; }
        .name-input-area button { padding: 10px 25px; font-size: 18px; background: #4caf50; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-window">
        <div class="circle-deco" style="width:400px; height:400px; top:-150px; left:-150px;"></div>
        <div class="circle-deco" style="width:500px; height:500px; bottom:-200px; right:-200px;"></div>

        <div id="home-screen" class="screen active">
            <div class="title-container">
                <h1 class="main-title">👑 皇家字形結構大挑戰</h1>
                <div class="subtitle">每個結構隨機抽 3 題，共 21 題皇家大挑戰！</div>
            </div>

            <div class="mode-selection">
                <button class="mode-btn btn-pink" onclick="triggerStartGame('princess')">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>公主風城堡</span>
                </button>
                <button class="mode-btn btn-blue" onclick="triggerStartGame('prince')">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>王子風聖殿</span>
                </button>
            </div>

            <div class="data-panels-container">
                <div class="panel-box">
                    <div class="panel-header"><i class="fa-solid fa-trophy" style="color:#ffc107"></i> 皇家英雄積分榜 (Top 5)</div>
                    <div class="panel-scroll-list" id="home-leaderboard-hook"></div>
                </div>
                <div class="panel-box">
                    <div class="panel-header"><i class="fa-solid fa-book-open" style="color:#4caf50"></i> 歷史學習記錄 (含日期時間)</div>
                    <div class="panel-scroll-list" id="home-history-hook"></div>
                </div>
            </div>
            
            <div style="margin-top: 15px;">
                <button class="btn-restart" style="background:#607d8b; padding: 6px 20px; font-size: 14px; border-radius: 10px;" onclick="clearAllData()">重設所有歷史記錄</button>
            </div>
        </div>

        <div id="play-screen" class="screen">
            <div class="top-hud">
                <div class="hud-card"><i class="fa-solid fa-crown" style="color:#ffd700"></i> 得分: <span id="current-score">0</span></div>
                <div class="hud-card"><i class="fa-solid fa-list-check" style="color:#2196f3"></i> 進度: <span id="progress-text">1 / 21</span></div>
                <button class="hud-card hud-btn-home" onclick="confirmBackToHome()"><i class="fa-solid fa-house"></i> 返回首頁</button>
            </div>

            <div class="game-main-zone">
                <div class="word-instruction">請問這個漢字屬於什麼結構？</div>
                <div class="tianzige-box" id="target-char-box"><span>慧</span></div>
            </div>

            <div class="quiz-options-container" id="quiz-options-wall"></div>
            <div class="stamp-feedback" id="right-stamp"><i class="fa-solid fa-circle-check"></i></div>
            <div class="stamp-feedback" id="wrong-stamp"><i class="fa-solid fa-circle-xmark"></i></div>
        </div>

        <div id="end-screen" class="screen">
            <div class="end-title">🎉 完美通關！</div>
            <div class="score-board">你的最終榮譽分數：<span id="final-score-board">0</span> 分</div>
            
            <div class="name-input-area" id="record-name-zone">
                <input type="text" id="player-name-input" placeholder="輸入名字登入英雄榜" maxlength="8">
                <button onclick="submitHeroScore()">儲存紀錄</button>
            </div>

            <div class="data-panels-container">
                <div class="panel-box">
                    <div class="panel-header"><i class="fa-solid fa-trophy" style="color:#ffc107"></i> 皇家英雄積分榜 (Top 5)</div>
                    <div class="panel-scroll-list" id="end-leaderboard-hook"></div>
                </div>
                <div class="panel-box">
                    <div class="panel-header"><i class="fa-solid fa-book-open" style="color:#4caf50"></i> 歷史學習記錄 (含日期時間)</div>
                    <div class="panel-scroll-list" id="end-history-hook"></div>
                </div>
            </div>

            <div class="btn-action-group">
                <button class="btn-restart" onclick="backToHome()">返回主選單</button>
            </div>
        </div>
    </div>

    <script>
        // 優化點 1：精準修正字形分類，移除了容易造成教學混淆的「凶」字框。
        const STRUCTURE_POOLS = {
            '上中下': [{ word: '慧' }, { word: '籃' }, { word: '意' }, { word: '鼻' }, { word: '蒸' }, { word: '蓋' }, { word: '曼' }, { word: '當' }, { word: '賞' }],
            '品字形': [{ word: '晶' }, { word: '轟' }, { word: '蟲' }, { word: '耳' }, { word: '森' }, { word: '磊' }, { word: '眾' }, { word: '鑫' }, { word: '聶' }],
            '全包圍': [{ word: '國' }, { word: '圓' }, { word: '回' }, { word: '固' }, { word: '圍' }, { word: '內' }, { word: '圈' }, { word: '四' }, { word: '園' }],
            '左上包圍': [{ word: '應' }, { word: '居' }, { word: '著' }, { word: '原' }, { word: '層' }, { word: '店' }, { word: '底' }, { word: '床' }, { word: '府' }],
            '右上包圍': [{ word: '句' }, { word: '式' }, { word: '包' }, { word: '刁' }, { word: '司' }, { word: '可' }],
            '左下包圍': [{ word: '遠' }, { word: '速' }, { word: '爬' }, { word: '翅' }, { word: '迪' }, { word: '送' }, { word: '迎' }, { word: '迫' }, { word: '邊' }],
            '三面包圍': [{ word: '閃' }, { word: '匹' }, { word: '同' }, { word: '風' }, { word: '區' }, { word: '醫' }]
        };

        const ALL_CATEGORIES = ['上中下', '品字形', '全包圍', '左上包圍', '右上包圍', '左下包圍', '三面包圍'];
        let runtimeConfig = { score: 0, quizList: [], currentIndex: 0, correctAnswer: '', isAnswering: false };

        // 輔助洗牌函式 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function changeActiveScreen(targetId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const destination = document.getElementById(targetId);
            if(destination) destination.classList.add('active');
        }

        function confirmBackToHome() {
            if(confirm("確定要放棄這一局，返回主選單嗎？")) backToHome();
        }

        function generateGameQuizSet() {
            let selectedQuizzes = [];
            for (let category in STRUCTURE_POOLS) {
                let pool = [...STRUCTURE_POOLS[category]];
                shuffleArray(pool); // 使用精準洗牌
                for (let i = 0; i < 3; i++) {
                    if (pool[i]) selectedQuizzes.push({ word: pool[i].word, type: category });
                }
            }
            shuffleArray(selectedQuizzes);
            return selectedQuizzes;
        }

        function triggerStartGame(selectedTheme) {
            if(selectedTheme === 'princess') { document.body.className = 'princess-theme'; } 
            else { document.body.className = 'prince-theme'; }

            runtimeConfig.score = 0;
            runtimeConfig.currentIndex = 0;
            runtimeConfig.quizList = generateGameQuizSet(); 
            runtimeConfig.isAnswering = false;

            document.getElementById('current-score').innerText = '0';
            document.getElementById('record-name-zone').style.display = 'flex';
            document.getElementById('player-name-input').value = '';

            changeActiveScreen('play-screen');
            setupNextQuizRound();
        }

        function setupNextQuizRound() {
            runtimeConfig.isAnswering = false;
            document.getElementById('progress-text').innerText = `${runtimeConfig.currentIndex + 1} / 21`;
            const currentQuiz = runtimeConfig.quizList[runtimeConfig.currentIndex];
            runtimeConfig.correctAnswer = currentQuiz.type;
            document.getElementById('target-char-box').innerHTML = `<span>${currentQuiz.word}</span>`;

            // 生成隨機 4 個選項
            let optionsSet = new Set([runtimeConfig.correctAnswer]);
            while(optionsSet.size < 4) {
                let candidate = ALL_CATEGORIES[Math.floor(Math.random() * ALL_CATEGORIES.length)];
                optionsSet.add(candidate);
            }
            let finalOptions = Array.from(optionsSet);
            shuffleArray(finalOptions);

            const optionsWall = document.getElementById('quiz-options-wall');
            optionsWall.innerHTML = '';
            finalOptions.forEach(optName => {
                const btn = document.createElement('button');
                btn.className = 'quiz-opt-btn';
                btn.innerText = optName + '結構';
                btn.onclick = () => processUserSelection(optName);
                optionsWall.appendChild(btn);
            });
        }

        // 優化點 3：修正答錯機制。答錯時扣分並直接翻牌前往下一題，建立具有鑑別度的積分體制。
        function processUserSelection(clickedName) {
            if (runtimeConfig.isAnswering) return; // 防止重複點擊
            runtimeConfig.isAnswering = true;

            const rightStamp = document.getElementById('right-stamp');
            const wrongStamp = document.getElementById('wrong-stamp');
            const targetGrid = document.getElementById('target-char-box');

            if(clickedName === runtimeConfig.correctAnswer) {
                runtimeConfig.score += 10;
                document.getElementById('current-score').innerText = runtimeConfig.score;
                rightStamp.classList.add('pop');
                setTimeout(() => {
                    rightStamp.classList.remove('pop');
                    moveToNextOrEnd();
                }, 600);
            } else {
                // 答錯邏輯：不卡關，但顯示叉叉、扣 5 分，隨後前往下一題
                runtimeConfig.score = Math.max(0, runtimeConfig.score - 5); 
                document.getElementById('current-score').innerText = runtimeConfig.score;
                
                targetGrid.classList.add('shake-effect');
                wrongStamp.classList.add('pop');
                
                setTimeout(() => {
                    targetGrid.classList.remove('shake-effect');
                    wrongStamp.classList.remove('pop');
                    moveToNextOrEnd();
                }, 600);
            }
        }

        function moveToNextOrEnd() {
            runtimeConfig.currentIndex++;
            if (runtimeConfig.currentIndex >= 21) { handleGameOver(); } 
            else { setupNextQuizRound(); }
        }

        function handleGameOver() {
            changeActiveScreen('end-screen');
            document.getElementById('final-score-board').innerText = runtimeConfig.score;
            renderAllDataPanels();
        }

        function submitHeroScore() {
            const inputField = document.getElementById('player-name-input');
            let name = inputField.value.trim() || '皇家勇士';
            
            const now = new Date();
            const timeString = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

            let localRecords = JSON.parse(localStorage.getItem('royal_quiz_v6_records') || '[]');
            localRecords.push({ name: name, score: runtimeConfig.score, datetime: timeString });
            localStorage.setItem('royal_quiz_v6_records', JSON.stringify(localRecords));
            
            document.getElementById('record-name-zone').style.display = 'none';
            alert('👑 榮譽紀錄成功上傳皇家榜單！');
            renderAllDataPanels();
        }

        function renderAllDataPanels() {
            const homeLeaderboard = document.getElementById('home-leaderboard-hook');
            const homeHistory = document.getElementById('home-history-hook');
            const endLeaderboard = document.getElementById('end-leaderboard-hook');
            const endHistory = document.getElementById('end-history-hook');
            
            let allRecords = JSON.parse(localStorage.getItem('royal_quiz_v6_records') || '[]');

            if(allRecords.length === 0) {
                const noDataHtml = `<div style="text-align:center; padding: 30px; opacity:0.5; font-size:16px;">暫無學習記錄，快開始挑戰吧！</div>`;
                homeLeaderboard.innerHTML = noDataHtml;
                homeHistory.innerHTML = noDataHtml;
                if(endLeaderboard) endLeaderboard.innerHTML = noDataHtml;
                if(endHistory) endHistory.innerHTML = noDataHtml;
                return;
            }

            // 歷史記錄 (最新遊玩排最前)
            let sortedHistory = [...allRecords].reverse();
            const historyHtml = sortedHistory.map((item) => `
                <div class="data-row">
                    <div>
                        <div>${item.name}</div>
                        <div class="time-stamp-text">${item.datetime}</div>
                    </div>
                    <span style="color:var(--accent); font-size:18px;">${item.score}分</span>
                </div>
            `).join('');

            // 排行榜 (最高前 5 名)
            let topFive = [...allRecords].sort((x, y) => y.score - x.score).slice(0, 5);
            const leaderboardHtml = topFive.map((item, idx) => `
                <div class="data-row">
                    <span>🏆 第 ${idx + 1} 名 : ${item.name}</span>
                    <span style="color:var(--accent);">${item.score} 分</span>
                </div>
            `).join('');

            // 同步渲染
            homeLeaderboard.innerHTML = leaderboardHtml;
            homeHistory.innerHTML = historyHtml;
            if(endLeaderboard) endLeaderboard.innerHTML = leaderboardHtml;
            if(endHistory) endHistory.innerHTML = historyHtml;
        }

        function clearAllData() {
            if(confirm("確定要清空所有的歷史排行榜與學習記錄嗎？（此操作無法復原）")) {
                localStorage.removeItem('royal_quiz_v6_records');
                renderAllDataPanels();
            }
        }

        function backToHome() {
            renderAllDataPanels(); 
            changeActiveScreen('home-screen');
        }

        window.onload = function() {
            renderAllDataPanels();
        };
    </script>
</body>
</html>
