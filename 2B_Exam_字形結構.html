<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇家字形結構大挑戰</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 基礎設定與公主風核心變數 */
        :root {
            --primary: #ff85a2;
            --secondary: #fce4ec;
            --accent: #d81b60;
            --bg-gradient: linear-gradient(135deg, #fff1f3 0%, #fce4ec 100%);
            --text: #4a1525;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 20px 40px rgba(255, 133, 162, 0.25);
            --border-color: #ffb7c5;
        }

        /* 王子風核心變數 */
        body.prince-theme {
            --primary: #2196f3;
            --secondary: #e3f2fd;
            --accent: #0d47a1;
            --bg-gradient: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 100%);
            --text: #0a1931;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 20px 40px rgba(33, 150, 243, 0.25);
            --border-color: #90caf9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* 遊戲視窗架構 */
        #game-window {
            width: 1100px;
            height: 700px;
            background: var(--card-bg);
            border-radius: 40px;
            box-shadow: var(--shadow);
            border: 12px solid white;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 畫面顯示/隱藏核心邏輯 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 10;
        }

        .screen.active {
            display: flex; 
            animation: screenFadeIn 0.5s ease forwards;
        }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 背景流線裝飾 */
        .circle-deco {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.12;
            filter: blur(40px);
            z-index: 1;
        }

        /* 首頁美化 */
        .title-container {
            text-align: center;
            margin-bottom: 30px;
            z-index: 5;
        }

        h1.main-title {
            font-size: 54px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px white, 6px 6px 0px var(--secondary);
        }

        .subtitle {
            font-size: 20px;
            color: var(--text);
            font-weight: bold;
            opacity: 0.8;
        }

        /* 可調式時間設定區塊 */
        .timer-config-zone {
            z-index: 5;
            background: white;
            padding: 15px 35px;
            border-radius: 25px;
            border: 3px dashed var(--primary);
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .timer-config-zone label {
            font-size: 22px;
            font-weight: 700;
        }

        .timer-select {
            font-size: 20px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            color: var(--accent);
            cursor: pointer;
            outline: none;
            background: white;
        }

        .mode-selection {
            display: flex;
            gap: 40px;
            z-index: 5;
        }

        .mode-btn {
            width: 250px;
            height: 180px;
            border-radius: 32px;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 26px;
            font-weight: 700;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .mode-btn i { font-size: 54px; }
        .btn-pink { background: linear-gradient(135deg, #ff6584, #ff85a2); border: 4px solid #fff; }
        .btn-blue { background: linear-gradient(135deg, #1e88e5, #42a5f5); border: 4px solid #fff; }
        
        .mode-btn:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 25px 40px rgba(0,0,0,0.15);
        }

        /* 遊戲進行畫面 HUD */
        .top-hud {
            position: absolute;
            top: 25px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-card {
            background: white;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .combo-badge {
            background: #ff9800;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 20px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* 田字格漢字顯示區 */
        .game-main-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        .word-instruction {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .tianzige-box {
            width: 200px;
            height: 200px;
            background: #fff;
            border: 6px solid var(--primary);
            border-radius: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 120px;
            font-weight: 900;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        /* 田字格虛線 */
        .tianzige-box::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            border-radius: 22px;
            background-image: 
                linear-gradient(to right, transparent 49%, #ccc 49%, #ccc 51%, transparent 51%),
                linear-gradient(to bottom, transparent 49%, #ccc 49%, #ccc 51%, transparent 51%);
            background-size: 100% 100%;
            pointer-events: none;
        }

        .tianzige-box span {
            z-index: 2;
            position: relative;
        }

        /* 選項按鈕排版 */
        .quiz-options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            width: 100%;
            max-width: 750px;
            margin-top: 30px;
        }

        .quiz-opt-btn {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 22px;
            padding: 18px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.03);
            color: var(--text);
        }

        .quiz-opt-btn:hover {
            border-color: var(--primary);
            background: var(--secondary);
            transform: translateY(-3px);
        }

        /* 答對大勾勾反饋 */
        .stamp-feedback {
            position: absolute;
            font-size: 160px;
            color: #4caf50;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stamp-feedback.pop {
            opacity: 0.9;
            transform: scale(1.2) rotate(-15deg);
        }

        /* 答錯晃動特效 */
        .shake-effect { animation: shakeAnimate 0.4s ease; }
        @keyframes shakeAnimate {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }

        /* 排行榜結算頁面 */
        .end-title { font-size: 54px; font-weight: 900; color: var(--accent); margin-bottom: 10px; }
        
        .score-board {
            font-size: 32px; font-weight: bold; margin-bottom: 25px;
        }
        .score-board span { color: var(--accent); font-size: 44px; }

        .leaderboard-box {
            width: 100%;
            max-width: 550px;
            background: white;
            border: 3px solid var(--border-color);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .leaderboard-header {
            font-size: 26px; font-weight: bold; text-align: center; margin-bottom: 15px;
            color: var(--accent); display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .leader-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; border-bottom: 1px solid #f0f0f0; font-size: 22px; font-weight: bold;
        }
        .leader-row:last-child { border-bottom: none; }

        .btn-restart {
            margin-top: 30px;
            padding: 16px 45px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: var(--accent);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .btn-restart:hover { transform: scale(1.05); }

        /* 名字輸入彈窗 */
        .name-input-area {
            display: flex; gap: 15px; margin-bottom: 20px;
        }
        .name-input-area input {
            padding: 12px 20px; font-size: 20px; border-radius: 15px; border: 2px solid #ccc; font-weight: bold; text-align: center;
        }
        .name-input-area button {
            padding: 12px 25px; font-size: 20px; background: #4caf50; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div class="circle-deco" style="width:400px; height:400px; top:-150px; left:-150px;"></div>
        <div class="circle-deco" style="width:500px; height:500px; bottom:-200px; right:-200px;"></div>

        <div id="home-screen" class="screen active">
            <div class="title-container">
                <h1 class="main-title">👑 皇家字形結構大挑戰</h1>
                <div class="subtitle">選一個喜歡的風格，開啟有趣的漢字冒險吧！</div>
            </div>

            <div class="timer-config-zone">
                <label for="timer-select-menu"><i class="fa-solid fa-clock" style="color: #ff9800;"></i> 每一局限時：</label>
                <select id="timer-select-menu" class="timer-select">
                    <option value="10">10 秒 (極速挑戰)</option>
                    <option value="20">20 秒 (快速熱身)</option>
                    <option value="30" selected>30 秒 (標準皇家賽)</option>
                    <option value="45">45 秒 (輕鬆練習)</option>
                    <option value="60">60 秒 (一分鐘特訓)</option>
                    <option value="90">90 秒 (漫長大探險)</option>
                    <option value="120">120 秒 (馬拉松試煉)</option>
                </select>
            </div>

            <div class="mode-selection">
                <button class="mode-btn btn-pink" onclick="triggerStartGame('princess')">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>公主風城堡</span>
                </button>
                <button class="mode-btn btn-blue" onclick="triggerStartGame('prince')">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>王子風聖殿</span>
                </button>
            </div>
        </div>

        <div id="play-screen" class="screen">
            <div class="top-hud">
                <div class="hud-card"><i class="fa-solid fa-crown" style="color:#ffd700"></i> 得分: <span id="current-score">0</span></div>
                <div class="hud-card" id="combo-display" style="visibility: hidden;"><span class="combo-badge">連勝! x<span id="combo-count">0</span></span></div>
                <div class="hud-card"><i class="fa-solid fa-hourglass-clock" style="color:#ff5252"></i> 時間: <span id="time-left">30</span> 秒</div>
            </div>

            <div class="game-main-zone">
                <div class="word-instruction">請問這個漢字屬於什麼結構？</div>
                <div class="tianzige-box" id="target-char-box"><span>慧</span></div>
            </div>

            <div class="quiz-options-container" id="quiz-options-wall">
                </div>

            <div class="stamp-feedback" id="right-stamp"><i class="fa-solid fa-circle-check"></i></div>
        </div>

        <div id="end-screen" class="screen">
            <div class="end-title">🎉 冒險完成！</div>
            <div class="score-board">你的最終榮譽分數：<span id="final-score-board">0</span> 分</div>
            
            <div class="name-input-area" id="record-name-zone">
                <input type="text" id="player-name-input" placeholder="輸入名字登入英雄榜" maxlength="8">
                <button onclick="submitHeroScore()">送出紀錄</button>
            </div>

            <div class="leaderboard-box">
                <div class="leaderboard-header"><i class="fa-solid fa-trophy" style="color:#ffc107"></i> 皇家英雄積分榜</div>
                <div id="leaderboard-rows-hook">
                    </div>
            </div>

            <button class="btn-restart" onclick="backToHome()">返回主選單</button>
        </div>
    </div>

    <script>
        // 功課照片中的題型漢字全面完美融入題庫
        const MASTER_DICTIONARY = [
            // 1. 上中下結構 (照片一、照片四)
            { word: '慧', type: '上中下' }, { word: '籃', type: '上中下' }, { word: '意', type: '上中下' },
            { word: '鼻', type: '上中下' }, { word: '蒸', type: '上中下' }, { word: '蓋', type: '上中下' },
            { word: '曼', type: '上中下' }, { word: '當', type: '上中下' }, { word: '賞', type: '上中下' },
            
            // 2. 品字形結構 (照片三、照片四)
            { word: '晶', type: '品字形' }, { word: '轟', type: '品字形' }, { word: '蟲', type: '品字形' },
            { word: '耳', type: '品字形' }, { word: '森', type: '品字形' }, { word: '磊', type: '品字形' },
            { word: '眾', type: '品字形' }, { word: '鑫', type: '品字形' }, { word: '聶', type: '品字形' },
            
            // 3. 全包圍結構 (照片五、照片六)
            { word: '國', type: '全包圍' }, { word: '圓', type: '全包圍' }, { word: '回', type: '全包圍' },
            { word: '固', type: '全包圍' }, { word: '圍', type: '全包圍' }, { word: '內', type: '全包圍' },
            { word: '圈', type: '全包圍' }, { word: '四', type: '全包圍' }, { word: '園', type: '全包圍' },

            // 4. 左上包圍結構 (照片二、照片四)
            { word: '應', type: '左上包圍' }, { word: '居', type: '左上包圍' }, { word: '著', type: '左上包圍' },
            { word: '原', type: '左上包圍' }, { word: '層', type: '左上包圍' }, { word: '店', type: '左上包圍' },
            { word: '底', type: '左上包圍' }, { word: '床', type: '左上包圍' }, { word: '府', type: '左上包圍' },

            // 5. 右上包圍結構 (照片四)
            { word: '句', type: '右上包圍' }, { word: '式', type: '右上包圍' }, { word: '包', type: '右上包圍' },
            { word: '刁', type: '右上包圍' }, { word: '司', type: '右上包圍' }, { word: '可', type: '右上包圍' },

            // 6. 左下包圍結構 (照片六)
            { word: '遠', type: '左下包圍' }, { word: '速', type: 'left-down' }, { word: '爬', type: '左下包圍' },
            { word: '翅', type: '左下包圍' }, { word: '迪', type: '左下包圍' }, { word: '送', type: '左下包圍' },
            { word: '迎', type: '左下包圍' }, { word: '迫', type: '左下包圍' },

            // 7. 三面包圍結構 (照片六)
            { word: '閃', type: '三面包圍' }, { word: '匹', type: '三面包圍' }, { word: '同', type: '三面包圍' },
            { word: '風', type: '三面包圍' }, { word: '區', type: '三面包圍' }, { word: '凶', type: '三面包圍' }, { word: '醫', type: '三面包圍' }
        ];

        // 統一更正題庫標籤
        MASTER_DICTIONARY.forEach(item => {
            if(item.type === 'left-down') item.type = '左下包圍';
        });

        const ALL_CATEGORIES = ['上中下', '品字形', '全包圍', '左上包圍', '右上包圍', '左下包圍', '三面包圍'];

        let runtimeConfig = {
            score: 0,
            timerClock: null,
            secondsLeft: 30,
            comboStreak: 0,
            correctAnswer: ''
        };

        function changeActiveScreen(targetId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const destination = document.getElementById(targetId);
            if(destination) {
                destination.classList.add('active');
            }
        }

        function triggerStartGame(selectedTheme) {
            if(selectedTheme === 'princess') {
                document.body.className = 'princess-theme';
            } else {
                document.body.className = 'prince-theme';
            }

            // 獲取自訂調整的限時秒數 (Adjustable Timer)
            const userSelectedTime = parseInt(document.getElementById('timer-select-menu').value) || 30;

            runtimeConfig.score = 0;
            runtimeConfig.secondsLeft = userSelectedTime;
            runtimeConfig.comboStreak = 0;
            
            document.getElementById('current-score').innerText = '0';
            document.getElementById('time-left').innerText = runtimeConfig.secondsLeft;
            document.getElementById('combo-display').style.visibility = 'hidden';
            document.getElementById('record-name-zone').style.display = 'flex';
            document.getElementById('player-name-input').value = '';

            changeActiveScreen('play-screen');
            setupNextQuizRound();

            clearInterval(runtimeConfig.timerClock);
            runtimeConfig.timerClock = setInterval(() => {
                runtimeConfig.secondsLeft--;
                document.getElementById('time-left').innerText = runtimeConfig.secondsLeft;
                
                if(runtimeConfig.secondsLeft <= 0) {
                    handleTimeOutGameOver();
                }
            }, 1000);
        }

        function setupNextQuizRound() {
            const randomItem = MASTER_DICTIONARY[Math.floor(Math.random() * MASTER_DICTIONARY.length)];
            runtimeConfig.correctAnswer = randomItem.type;

            document.getElementById('target-char-box').innerHTML = `<span>${randomItem.word}</span>`;

            let finalOptions = [runtimeConfig.correctAnswer];
            while(finalOptions.length < 4) {
                let candidate = ALL_CATEGORIES[Math.floor(Math.random() * ALL_CATEGORIES.length)];
                if(!finalOptions.includes(candidate)) {
                    finalOptions.push(candidate);
                }
            }
            finalOptions.sort(() => Math.random() - 0.5);

            const optionsWall = document.getElementById('quiz-options-wall');
            optionsWall.innerHTML = '';
            finalOptions.forEach(optName => {
                const btn = document.createElement('button');
                btn.className = 'quiz-opt-btn';
                btn.innerText = optName + '結構';
                btn.onclick = () => processUserSelection(optName);
                optionsWall.appendChild(btn);
            });
        }

        function processUserSelection(clickedName) {
            const rightStamp = document.getElementById('right-stamp');
            const targetGrid = document.getElementById('target-char-box');

            if(clickedName === runtimeConfig.correctAnswer) {
                runtimeConfig.comboStreak++;
                let pointsEarned = 10 + (runtimeConfig.comboStreak * 2);
                runtimeConfig.score += pointsEarned;
                document.getElementById('current-score').innerText = runtimeConfig.score;

                if(runtimeConfig.comboStreak >= 2) {
                    const comboBadge = document.getElementById('combo-display');
                    comboBadge.style.visibility = 'visible';
                    document.getElementById('combo-count').innerText = runtimeConfig.comboStreak;
                }

                rightStamp.classList.add('pop');
                setTimeout(() => rightStamp.classList.remove('pop'), 400);

                setupNextQuizRound();
            } else {
                runtimeConfig.comboStreak = 0;
                document.getElementById('combo-display').style.visibility = 'hidden';

                targetGrid.classList.add('shake-effect');
                setTimeout(() => targetGrid.classList.remove('shake-effect'), 400);
            }
        }

        function handleTimeOutGameOver() {
            clearInterval(runtimeConfig.timerClock);
            changeActiveScreen('end-screen');
            document.getElementById('final-score-board').innerText = runtimeConfig.score;
            displayLeaderboard();
        }

        function submitHeroScore() {
            const inputField = document.getElementById('player-name-input');
            let name = inputField.value.trim() || '皇家勇士';
            
            let localRecords = JSON.parse(localStorage.getItem('royal_quiz_v3_ranks') || '[]');
            localRecords.push({
                name: name,
                score: runtimeConfig.score,
                timestamp: new Date().toLocaleDateString()
            });

            localRecords.sort((x, y) => y.score - x.score);
            localStorage.setItem('royal_quiz_v3_ranks', JSON.stringify(localRecords.slice(0, 5)));

            document.getElementById('record-name-zone').style.display = 'none';
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const hook = document.getElementById('leaderboard-rows-hook');
            let localRecords = JSON.parse(localStorage.getItem('royal_quiz_v3_ranks') || '[]');

            if(localRecords.length === 0) {
                hook.innerHTML = `<div style="text-align:center; padding: 20px; opacity:0.6;">還沒有勇士留下歷史，快送出分數吧！</div>`;
                return;
            }

            hook.innerHTML = localRecords.map((item, idx) => `
                <div class="leader-row">
                    <span>🏆 第 ${idx + 1} 名 : ${item.name}</span>
                    <span style="color:var(--accent);">${item.score} 分</span>
                </div>
            `).join('');
        }

        function backToHome() {
            changeActiveScreen('home-screen');
        }
    </script>
</body>
</html>
