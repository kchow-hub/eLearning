let currentChapter = null, quizPool = [], qIdx = 0, isDictationMode = false;

function init() {
    const list = document.getElementById('chapter-list'); list.innerHTML = '';
    for (let id in chaptersData) {
        const item = chaptersData[id]; const card = document.createElement('div');
        card.className = 'chapter-card'; card.innerHTML = `<div style="font-weight:bold;">${item.t}</div><div class="btn-group">
            <button class="mode-btn btn-lv0" onclick="startLV0(${id})">LV0 全篇對照</button>
            <button class="mode-btn btn-lv1" onclick="startQuiz(${id}, false)">LV1 選擇挑戰</button>
            <button class="mode-btn btn-lv2" onclick="startQuiz(${id}, true)">LV2 默寫挑戰</button></div>`;
        list.appendChild(card);
    }
}

const isIndexInKeys = (index, s, dict) => {
    for(let k in dict) {
        let start = 0, idx = -1;
        while((idx = s.indexOf(k, start)) !== -1) {
            if(index >= idx && index < idx + k.length) return true;
            start = idx + 1;
        }
    }
    return false;
};

function startLV0(id) {
    const c = chaptersData[id]; currentChapter = c;
    document.getElementById('lv0-head').innerText = c.t; document.getElementById('source-tag').innerText = `(${c.tag})`;
    let html = "", s = c.fullSource;
    
    for(let i=0; i<s.length; i++){
        let char = s[i], cls = "char-span";
        if(isIndexInKeys(i, s, c.translations)) cls += " trans-green";
        else if(isIndexInKeys(i, s, c.exercises)) cls += " exercise-red";
        else if(isIndexInKeys(i, s, c.notes)) cls += " note-orange";
        
        html += `<span class="${cls}" onclick="speak('${char}')">${char}</span>`;
    }
    
    document.getElementById('lv0-source').innerHTML = html; document.getElementById('lv0-trans').innerText = c.fullTrans;
    let nH = ""; for(let k in c.notes) nH += `• <b>${k}</b>: ${c.notes[k].ans}<br>`; document.getElementById('lv0-notes-list').innerHTML = nH;
    let eH = ""; for(let k in c.exercises) eH += `• <b>${k}</b>: ${c.exercises[k].ans}<br>`; document.getElementById('lv0-ex-list').innerHTML = eH;
    let tH = ""; for(let k in c.translations) tH += `• <b>${k}</b><br>　👉 ${c.translations[k].ans}<br>`; document.getElementById('lv0-trans-list').innerHTML = tH;
    window.curRaw = c.fullSource; window.curTrans = c.fullTrans; switchScreen('screen-lv0');
}

function startQuiz(id, dictation) {
    const c = chaptersData[id]; currentChapter = c; isDictationMode = dictation; quizPool = [];
    const addToPool = (data, type) => { for(let k in data) quizPool.push({ type: type, q: type==='翻譯/理解'?`題目：「${k}」`:`「${k}」的意思是？`, a: data[k].ans, o: data[k].o, kw: [k] }); };
    addToPool(c.notes, "注釋"); addToPool(c.exercises, "練習"); addToPool(c.translations, "翻譯/理解");
    quizPool.sort(() => Math.random() - 0.5); qIdx = 0; window.curRaw = c.fullSource; switchScreen('screen-quiz');
    const b = document.getElementById('mode-badge'); b.innerText = isDictationMode ? "LV2 默寫挑戰" : "LV1 選擇挑戰"; b.style.background = isDictationMode ? "#2c3e50" : "#c0392b"; renderQ();
}

function renderQ() {
    const q = quizPool[qIdx]; document.getElementById('quiz-progress').innerText = `${qIdx+1} / ${quizPool.length}`;
    document.getElementById('quiz-question').innerText = `【${q.type}題】${q.q}`;
    let context = window.curRaw;
    q.kw.forEach(k => { if(context.indexOf(k) !== -1) context = context.replace(new RegExp(k, 'g'), `<span class="blue-highlight">${k}</span>`); });
    document.getElementById('quiz-source-context').innerHTML = context;
    document.getElementById('feedback-msg').style.display = "none"; document.getElementById('next-btn').classList.add('hidden');
    
    const optContainer = document.getElementById('quiz-options');
    const dictContainer = document.getElementById('quiz-dictation');

    if(isDictationMode) {
        optContainer.classList.add('hidden'); dictContainer.classList.remove('hidden');
        document.getElementById('user-input').value = ""; document.getElementById('user-input').disabled = false; document.getElementById('user-input').focus();
    } else {
        dictContainer.classList.add('hidden'); optContainer.classList.remove('hidden');
        optContainer.innerHTML = '';
        [...q.o].sort(() => Math.random() - 0.5).forEach(o => {
            const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = o;
            btn.onclick = () => handleAnswer(o === q.a, q.a, btn); optContainer.appendChild(btn);
        });
    }
    if(document.getElementById('auto-read-toggle').checked) speak(q.q);
}

function handleAnswer(isCorrect, correctAns, btn = null) {
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    if(isCorrect) { if(btn) btn.classList.add('correct'); speakFeedback(true); } 
    else { if(btn) btn.classList.add('wrong'); document.querySelectorAll('.opt-btn').forEach(b => { if(b.innerText === correctAns) b.classList.add('correct'); }); speakFeedback(false, correctAns); }
    document.getElementById('next-btn').classList.remove('hidden');
}

function checkDictation() {
    const q = quizPool[qIdx], input = document.getElementById('user-input').value.trim();
    const clean = (s) => s.replace(/[，。！？：、()（）_]/g, "");
    const isCorrect = clean(input) === clean(q.a), fb = document.getElementById('feedback-msg');
    fb.style.display = "block"; document.getElementById('user-input').disabled = true;
    if(isCorrect) { fb.innerText = "答對了！"; fb.style.background = "#e6ffed"; fb.style.color = "#27ae60"; speakFeedback(true); } 
    else { fb.innerText = `答錯了。正確答案係：${q.a}`; fb.style.background = "#fdf2f2"; fb.style.color = "#e74c3c"; speakFeedback(false, q.a); }
    document.getElementById('next-btn').classList.remove('hidden');
}

function nextQ() { 
    qIdx++; 
    if(qIdx < quizPool.length) renderQ(); 
    else { alert("🎉 完成挑戰！"); showMenu(); } 
}

function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='zh-HK'; u.rate=0.9; window.speechSynthesis.speak(u); }
function speakFeedback(isC, ans = "") { window.speechSynthesis.cancel(); let msg = isC ? "答對了" : `答錯了，正確答案係 ${ans}`; const u = new SpeechSynthesisUtterance(msg); u.lang='zh-HK'; u.rate=0.9; window.speechSynthesis.speak(u); }
function speakTextId(type) { speak(type==='raw'?window.curRaw:window.curTrans); }
function switchScreen(id) { ['menu','screen-lv0','screen-quiz'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.speechSynthesis.cancel(); }
function showMenu() { switchScreen('menu'); }
window.onload = init;
</script>
</body>
</html>
